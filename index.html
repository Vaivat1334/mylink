<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bio Link</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050508;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
    cursor: crosshair;
  }

  /* ---- LIGHT BEAMS ---- */
  .beams {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .beam {
    position: absolute;
    top: -10%;
    width: 2px;
    height: 120%;
    background: linear-gradient(to bottom,
      transparent 0%,
      rgba(160,80,255,0.05) 10%,
      rgba(200,140,255,0.9) 40%,
      rgba(255,255,255,1) 50%,
      rgba(200,140,255,0.9) 60%,
      rgba(160,80,255,0.05) 90%,
      transparent 100%
    );
    animation: beam-move 6s ease-in-out infinite;
    filter: blur(0.5px);
  }
  .beam::after {
    content: '';
    position: absolute;
    inset: 0;
    background: inherit;
    filter: blur(6px);
    opacity: 0.5;
  }
  .beam:nth-child(1) { left: 14%;  animation-delay: 0s;    animation-duration: 7s; }
  .beam:nth-child(2) { left: 28%;  animation-delay: 1.5s;  animation-duration: 8s; }
  .beam:nth-child(3) { left: 68%;  animation-delay: 0.8s;  animation-duration: 6.5s; }
  .beam:nth-child(4) { left: 82%;  animation-delay: 2.2s;  animation-duration: 7.5s; }
  .beam:nth-child(5) { left: 95%;  animation-delay: 0.3s;  animation-duration: 9s; }

  @keyframes beam-move {
    0%, 100% { opacity: 0.6; transform: scaleX(1); }
    50%       { opacity: 1;   transform: scaleX(1.5); }
  }

  /* ---- STARS ---- */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: #fff;
    border-radius: 50%;
    animation: twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.1; }
    50%       { opacity: 0.8; }
  }

  /* ---- CARD ---- */
  .card {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    text-align: center;
    padding: 0 20px;
    animation: fade-in 1.2s ease both;
  }
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ---- AVATAR ---- */
  .avatar-wrap {
    width: 90px; height: 90px;
    border-radius: 50%;
    border: 2px solid rgba(180,100,255,0.6);
    padding: 3px;
    background: rgba(255,255,255,0.05);
    box-shadow: 0 0 20px rgba(160,80,255,0.4), 0 0 60px rgba(160,80,255,0.15);
    margin-bottom: -20px;
    position: relative;
    z-index: 12;
    animation: avatar-pulse 4s ease-in-out infinite;
  }
  @keyframes avatar-pulse {
    0%, 100% { box-shadow: 0 0 20px rgba(160,80,255,0.4), 0 0 60px rgba(160,80,255,0.15); }
    50%       { box-shadow: 0 0 30px rgba(180,120,255,0.7), 0 0 80px rgba(160,80,255,0.3); }
  }
  .avatar-wrap img {
    width: 100%; height: 100%;
    border-radius: 50%;
    object-fit: cover;
    display: block;
  }
  .avatar-placeholder {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: linear-gradient(135deg, #3a1a6e, #1a0a3a);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
  }

  /* ---- LOGO / NAME ---- */
  .logo-area {
    position: relative;
    z-index: 11;
    margin-bottom: 8px;
  }
  .username-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(72px, 18vw, 130px);
    letter-spacing: 4px;
    color: #fff;
    line-height: 1;
    text-shadow:
      2px 2px 0 #000,
      -2px -2px 0 #000,
      4px 4px 8px rgba(0,0,0,0.8);
    /* Lightning bolt / sharp style via clip */
    -webkit-text-stroke: 1px rgba(255,255,255,0.3);
    position: relative;
    display: inline-block;
    transform: skew(-4deg);
    filter: drop-shadow(0 0 15px rgba(255,255,255,0.15));
  }
  .username-suffix {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 300;
    color: rgba(200,160,255,0.8);
    letter-spacing: 3px;
    margin-top: -8px;
    display: block;
  }

  /* ---- BIO ---- */
  .bio {
    font-size: 14px;
    color: rgba(200,180,220,0.7);
    letter-spacing: 2px;
    margin-bottom: 8px;
    font-weight: 300;
  }

  /* ---- UID / BADGE ---- */
  .uid {
    font-size: 11px;
    color: rgba(180,140,220,0.4);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  /* ---- LINKS ---- */
  .links {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 340px;
  }
  .link-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 18px;
    background: rgba(255,255,255,0.04);
    border: 0.5px solid rgba(180,100,255,0.25);
    border-radius: 8px;
    color: rgba(230,210,255,0.85);
    text-decoration: none;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    letter-spacing: 1.5px;
    font-weight: 600;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }
  .link-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, rgba(160,80,255,0.1), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }
  .link-btn:hover {
    background: rgba(255,255,255,0.07);
    border-color: rgba(200,140,255,0.5);
    color: #fff;
    transform: translateX(4px);
    box-shadow: 0 0 20px rgba(160,80,255,0.15);
  }
  .link-btn:hover::before { opacity: 1; }
  .link-icon {
    width: 20px; height: 20px;
    flex-shrink: 0;
    opacity: 0.7;
  }
  .link-label { flex: 1; text-align: center; }
  .link-arrow {
    font-size: 12px;
    opacity: 0.4;
    transition: opacity 0.2s, transform 0.2s;
  }
  .link-btn:hover .link-arrow { opacity: 0.8; transform: translateX(3px); }

  /* ---- VIEWS ---- */
  .views {
    margin-top: 24px;
    font-size: 11px;
    color: rgba(180,140,220,0.35);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* ---- DECORATIVE DOTS ---- */
  .deco-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    display: inline-block;
    margin: 0 3px;
    animation: dot-pulse 2s ease-in-out infinite;
  }
  .deco-dot.pink  { background: #ff6b9d; animation-delay: 0s; }
  .deco-dot.white { background: rgba(255,255,255,0.6); animation-delay: 0.7s; }
  @keyframes dot-pulse {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50%       { transform: scale(1.4); opacity: 1; }
  }
  .deco-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2px;
    margin-bottom: 20px;
  }
</style>
</head>
<body>

<!-- Light Beams -->
<div class="beams">
  <div class="beam"></div>
  <div class="beam"></div>
  <div class="beam"></div>
  <div class="beam"></div>
  <div class="beam"></div>
</div>

<!-- Stars -->
<div class="stars" id="stars"></div>

<!-- Main Card -->
<div class="card">

  <!-- Avatar -->
  <div class="avatar-wrap">
    <!-- แทน src ด้วย URL รูปโปรไฟล์ของคุณ -->
    <div class="avatar-placeholder">🐻‍❄️</div>
  </div>

  <!-- Logo Name -->
  <div class="logo-area">
    <!-- เปลี่ยน AZZEX เป็นชื่อของคุณ -->
    <div class="username-logo">AZZEX</div>
    <span class="username-suffix">𝜗𝜚</span>
  </div>

  <!-- Bio -->
  <p class="bio">💗 ૮₍˶ •. • ⑅₎ა ♡ ‧₊🍒⋅°✮</p>

  <!-- Deco -->
  <div class="deco-row">
    <span>🐻</span>
    <span class="deco-dot pink"></span>
    <span class="deco-dot white"></span>
    <span>🍒</span>
  </div>

  <!-- UID -->
  <div class="uid">UID 1,204,044</div>

  <!-- Links -->
  <div class="links">

    <!-- ลิ้งค์ที่ 1 -->
    <a href="https://discord.com/invite/kn78euN5J4" class="link-btn" target="_blank">
      <svg class="link-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M20.317 4.37a19.79 19.79 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.033.055A19.9 19.9 0 0 0 6.073 20.4a.077.077 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
      </svg>
      <span class="link-label">DISCORD SERVER</span>
      <span class="link-arrow">→</span>
    </a>

  </div>

  <!-- Views -->
  <div class="views">👁 1,818 profile views</div>

</div>

<script>
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      animation-delay:${Math.random()*5}s;
      animation-duration:${2+Math.random()*4}s;
      opacity:${Math.random()*0.5};
    `;
    starsEl.appendChild(s);
  }
</script>
</body>
</html>
